<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Download Link X-Ray</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <h1>Download Link X-Ray</h1>
      </header>

      <section class="switches" aria-label="Extension controls">
        <label class="switch-row">
          <span>
            <strong>Highlight links</strong>
            <small>Global extension setting</small>
          </span>
          <input id="enabled" type="checkbox" aria-label="Enable Download Link X-Ray globally">
        </label>

        <label class="switch-row">
          <span>
            <strong>This site</strong>
            <small id="siteLabel">Current tab</small>
          </span>
          <input id="siteEnabled" type="checkbox" aria-label="Enable Download Link X-Ray on this site">
        </label>
      </section>

      <p id="status" class="status" role="status"></p>

      <section class="summary" id="summary">
        <div class="metric">
          <strong id="marked">-</strong>
          <span>marked</span>
        </div>
        <div class="metric">
          <strong id="suspicious">-</strong>
          <span>suspicious</span>
        </div>
        <div class="metric">
          <strong id="executables">-</strong>
          <span>executables</span>
        </div>
      </section>

      <section id="best" class="best hidden"></section>

      <footer>
        <button id="rescan" type="button">Rescan page</button>
        <button id="options" type="button">Options</button>
      </footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
